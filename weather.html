<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Document</title>
        <style>
            .flex{
                display:flex;
                justify-content: space-around;
                width: 50%;
                border:1px solid gray;
                padding: 10px;
            }
            img{
                width:100px;
                height:100px;
            }
        </style>
    </head>
    <body>
        <div class="flex">
            <div>
                <h1 id="name"></h1>
                <h2 id="region"></h2>
                <p id="temp"></p>
                <p id="humidity"></p>
            </div>
            <img id="icon" src="" alt="weather icon"/>
        </div>
        <script>
            fetch("https://api.weatherapi.com/v1/current.json?q=new_york&key=9ef5e7e0c3b046a6b1b92053260403")
            .then(response=>response.json())
            .then(data=>{
                document.getElementById("icon").setAttribute("src",data.current.condition.icon)
                document.getElementById("name").textContent=data.location.name
                document.getElementById("region").textContent=data.location.region+", "+data.location.country
                document.getElementById("temp").textContent="Temperature : "+data.current.temp_c
                document.getElementById("humidity").textContent="Humidity : "+data.current.humidity
                console.log(data)
            })
        </script>
    </body>
</html>
